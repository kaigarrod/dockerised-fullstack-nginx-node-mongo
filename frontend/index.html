<!DOCTYPE html>
<html lang="en">
<body>
<h1>Movies</h1>
<ul id="movies"></ul>

<script>
    fetch('/api/films')
        .then(res => res.json())
        .then(data => {
            const list = document.createElement('ul');

            data.forEach(film => {
                const li = document.createElement('li');
                li.textContent = film.name;
                list.appendChild(li);
            });

            document.body.appendChild(list);
        });
</script>
</body>
</html>
