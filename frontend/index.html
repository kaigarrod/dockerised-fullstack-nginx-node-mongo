<!DOCTYPE html>
<html lang="en">
<body>
<h1>Movies</h1>
<ul id="movies"></ul>

<script>
    fetch('/api/movies')
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('movies');
            data.forEach(movie => {
                const li = document.createElement('li');
                li.textContent = movie;
                list.appendChild(li);
            });
        })
        .catch(err => console.error(err));
</script>
</body>
</html>
